name: Weekly AI Researcher Update

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9AM UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run weekly update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/weekly-update.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/researchers.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/researchers.json
          git commit -m "chore: weekly researcher data update $(date +%Y-%m-%d)"
          git push
